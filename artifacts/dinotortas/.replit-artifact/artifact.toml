kind = "web"
previewPath = "/"
title = "DinoTortas"
version = "1.0.0"
id = "artifacts/dinotortas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22817

[services.development]
run = "pnpm --filter @workspace/dinotortas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dinotortas", "run", "build" ]
publicDir = "artifacts/dinotortas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22817"
BASE_PATH = "/"
